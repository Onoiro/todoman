<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoMan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>TodoMan</h1>
  </header>

  <main>
    <!-- Панель управления -->
    <section id="control-panel">
      <!-- Форма добавления задачи -->
      <form id="task-form">
        <input type="text" id="task-input" placeholder="Добавить новую задачу">
        <button type="submit">Добавить</button>
      </form>

      <!-- Строка поиска -->
      <input type="text" id="search-input" placeholder="Поиск задач">
    </section>

    <!-- Список задач -->
    <ul id="task-list">
    </ul>

    <!-- Блок фильтрации -->
    <section id="filter-panel">
      <button type="button" id="filter-all">Все</button>
      <button type="button" id="filter-active">Активные</button>
      <button type="button" id="filter-done">Завершённые</button>
    </section>
  </main>

  <footer>
  </footer>

  <script src="app.js"></script>
</body>
</html>
